name: 🏅 대회 데이터 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 오전 9시 (KST = UTC+9)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 대회 데이터 업데이트 실행
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
        run: python scripts/update_events.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/last_update.json
          git diff --staged --quiet || git commit -m "🤖 대회 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
